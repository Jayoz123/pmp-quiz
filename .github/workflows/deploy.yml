name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-bump APP_VERSION (timestamp)
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          echo "Deploying version: $VERSION"
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VERSION'/" pmp-quiz-app/app.js
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VERSION'/" pmp-quiz-app/service-worker.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pmp-quiz-app --project-name=pmp-quiz-app
